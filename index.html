<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global IoT Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ffffff; margin-bottom: 10px; }
        
        #status-bar { margin-bottom: 20px; font-size: 0.9em; }
        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .offline { background-color: #ff4d4d; }

        .btn-start { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .btn-start:hover { background: #0056b3; }

        #alert-box { background: #ff4d4d; color: white; padding: 15px; display: none; margin: 10px auto; width: 80%; border-radius: 10px; font-weight: bold; border: 2px solid white; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #00ffcc; }
        .label { font-size: 0.8em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1.8em; color: #00ffcc; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Sensor Telemetry</h1>
    
    <div id="status-bar">
        <span id="dot" class="status-dot"></span>
        <span id="status-text">Connecting to Cloud...</span>
    </div>

    <button class="btn-start" onclick="enableAudio()">Enable Voice Alerts</button>

    <div id="alert-box">⚠️ SYSTEM VIBRATION DETECTED! ⚠️</div>

    <div class="grid">
        <div class="card"><span class="label">Temperature</span><span class="val" id="T">--</span><small>°C</small></div>
        <div class="card"><span class="label">Humidity</span><span class="val" id="H">--</span><small>%</small></div>
        <div class="card"><span class="label">Pressure</span><span class="val" id="P">--</span><small>hPa</small></div>
        <div class="card"><span class="label">Voltage</span><span class="val" id="V">--</span><small>V</small></div>
        <div class="card"><span class="label">Current</span><span class="val" id="A">--</span><small>A</small></div>
        <div class="card"><span class="label">Object Count</span><span class="val" id="Cnt">0</span></div>
    </div>

    <script>
        // CONFIGURATION - CHANGE 'my_iot_project' TO SOMETHING UNIQUE
        const BASE_TOPIC = "my_iot_project_77"; 
        const MQTT_BROKER = "broker.hivemq.com";
        const MQTT_PORT = 8884; // Secure WebSocket Port

        const client = new Paho.MQTT.Client(MQTT_BROKER, MQTT_PORT, "web_client_" + Math.random().toString(16).slice(2));

        function enableAudio() {
            // Browsers need a click to allow speech
            const welcome = new SpeechSynthesisUtterance("Voice alerts enabled");
            window.speechSynthesis.speak(welcome);
            document.querySelector('.btn-start').style.display = 'none';
        }

        client.onMessageArrived = (message) => {
            console.log("Data Received: " + message.payloadString);
            if (message.destinationName.includes("vibration")) {
                triggerAlert();
            } else {
                updateUI(message.payloadString);
            }
        };

        client.onConnectionLost = (responseObject) => {
            document.getElementById('dot').className = "status-dot offline";
            document.getElementById('status-text').innerText = "Disconnected. Retrying...";
            setTimeout(() => connect(), 5000);
        };

        function onConnect() {
            document.getElementById('dot').className = "status-dot online";
            document.getElementById('status-text').innerText = "Live: Connected to HiveMQ Cloud";
            client.subscribe(BASE_TOPIC + "/sensors");
            client.subscribe(BASE_TOPIC + "/vibration");
        }

        function triggerAlert() {
            document.getElementById('alert-box').style.display = 'block';
            const speech = new SpeechSynthesisUtterance("Warning! Vibration detected in the hardware.");
            window.speechSynthesis.speak(speech);
            setTimeout(() => { document.getElementById('alert-box').style.display = 'none'; }, 5000);
        }

        function updateUI(dataString) {
            // Expected format: Cnt:10,V:12.5,A:0.5,T:28,H:50,P:1012
            const pairs = dataString.split(',');
            pairs.forEach(pair => {
                const [key, val] = pair.split(':');
                const el = document.getElementById(key);
                if (el) el.innerText = val;
            });
        }

        function connect() {
            client.connect({
                onSuccess: onConnect,
                onFailure: (err) => {
                    console.log("Fail:", err);
                    setTimeout(connect, 5000);
                },
                useSSL: true,
                timeout: 3,
                keepAliveInterval: 60
            });
        }

        // Start connection
        connect();
    </script>
</body>
</html>
